databaseChangeLog:
  - changeSet:
      id: 007-create-enrollment-table
      author: antigravity
      changes:
        - createTable:
            tableName: enrollment
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employee_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: training_session_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: enrollment
            baseColumnNames: employee_id
            referencedTableName: employee
            referencedColumnNames: id
            constraintName: fk_enrollment_employee
        - addForeignKeyConstraint:
            baseTableName: enrollment
            baseColumnNames: training_session_id
            referencedTableName: training_session
            referencedColumnNames: id
            constraintName: fk_enrollment_training_session
