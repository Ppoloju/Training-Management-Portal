# Common configuration for all environments.
# Default active profile is local, but it can be overridden by JVM args or environment variables.
spring.application.name=training-management-portal
spring.profiles.active=local
#spring.main.time-zone=UTC

# Jackson common configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# Common datasource settings for PostgreSQL-based runtime environments
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
app.security.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.security.jwt.expiration-ms=86400000

# Default authentication credentials
auth.default-username=admin
auth.default-password=password

# Liquibase common configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Logging defaults shared across environments
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.training.portal=INFO

# Common actuator settings
## Actuator settings commented out to avoid unknown-property warnings in this environment
#management.endpoints.web.exposure.include=health,info
#management.endpoint.health.show-details=never
